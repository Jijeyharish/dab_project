# This is a Databricks asset bundle definition for dab_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project
  uuid: dc65eb4c-b68f-48a4-930a-af6285ff95f9

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    default : citibike_dev
  dev_flag :
    default : true

  schema:
    description: The schema to use



targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-962ec706-5b16.cloud.databricks.com
    variables:
      schema: dev
      dev_flag : true
  test:
    mode: production
    
    workspace:
      host: https://dbc-17cbe7de-090a.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/jijeyharish@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: citibike_test
      schema: prod
      dev_flag : false
    permissions:
      - user_name: harishjijey@gmail.com
        level: CAN_MANAGE
  prod:
    mode: production
    workspace:
      host: https://dbc-8fc8b6b2-f985.cloud.databricks.com/
      # We explicitly deploy to /Workspace/Users/jijeyharish@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: citibike_prod
      schema: prod
      dev_flag : false
    permissions:
      - user_name: harishkumarp562@gmail.com
        level: CAN_MANAGE
